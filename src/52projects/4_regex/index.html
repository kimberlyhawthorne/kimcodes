<!DOCTYPE html>
<html>
<head>
	<title>Kim Codes 52 Projects: 3 - Regular Expressions</title>
	<link href='https://fonts.googleapis.com/css?family=Source+Sans+Pro:200' rel='stylesheet' type='text/css'>
	<!-- build:css -->
	<link rel="stylesheet" type="text/css" href="styles/main.css" />
	<!-- endbuild -->
	<!-- build:js -->
	<script type="text/javascript" src="js/app.js"></script>
	<!-- endbuild -->
</head>
<body>
	<h2>Regular Expressions</h2>

	<form id="genericForm">
		<input placeholder="zip code" id="zipcode" type="text" data-regex="zipcode" maxlength="5" data-chars="5" />
		<input placeholder="telephone" id="telephone" type="text" data-regex="telephone" maxlength="14" data-chars="14" class="autoformat" />
		<input placeholder="email address" id="email" type="text" data-regex="email" />
		<input placeholder="birthday, mm/dd/yyyy" id="birthdate" type="text" data-regex="birthdate" maxlength="10" data-chars="10" class="autoformat" />
	</form>

	<footer>
		<p>Icons by Austin Condiff / CC BY / Colors changed from original</p>
	</footer>

</body>
</html>
